<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bautizo de Lisandro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f8f3ed;
  color: #444;
  text-align: center;
}

.portada {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(#ffffff, #f8f3ed);
}

h1 {
  font-size: 45px;
  color: #b08b57;
}

h2 {
  font-weight: normal;
  color: #777;
}

.menu {
  margin-top: 30px;
}

.boton {
  display: block;
  margin: 12px auto;
  width: 220px;
  padding: 15px;
  background: #b08b57;
  color: white;
  border-radius: 30px;
  text-decoration: none;
}

.seccion {
  padding: 40px 20px;
}

.tarjeta {
  background: white;
  margin: 20px auto;
  padding: 25px;
  border-radius: 20px;
  max-width: 400px;
  box-shadow: 0 5px 15px #ddd;
}
</style>

</head>

<body>

<div class="portada">
<h1>Mi Bautizo</h1>
<h2>Lisandro</h2>

<p>Con mucha alegría comparto este día especial con ustedes</p>

<div class="menu">
<a class="boton" href="#dia">Día del Bautizo</a>
<a class="boton" href="#hora">Hora</a>
<a class="boton" href="#recuerdos">Recuerdos</a>
</div>

</div>


<div id="dia" class="seccion">
<div class="tarjeta">
<h2>Día del Bautizo</h2>
<p>Septiembre 2026</p>
</div>
</div>


<div id="hora" class="seccion">
<div class="tarjeta">
<h2>Hora</h2>
<p>Aquí colocaremos la hora del evento</p>
</div>
</div>


<div id="recuerdos" class="seccion">
<div class="tarjeta">
<h2>Mis recuerdos</h2>
<p>Escanea el código QR y comparte tus fotos con Lisandro</p>
</div>
</div>

</body>
</html>
